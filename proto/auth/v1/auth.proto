syntax = "proto3";
package auth.v1;
option go_package = "github.com/chejholloway/conduit-backend/gen/auth/v1;authv1";

message User {
  string email = 1;
  string token = 2;
  string username = 3;
  string bio = 4;
  string image = 5;
}

message RegisterRequest {
  string username = 1;
  string email = 2;
  string password = 3;
}
message RegisterResponse { User user = 1; }

message LoginRequest {
  string email = 1;
  string password = 2;
}
message LoginResponse { User user = 1; }

message GetCurrentUserRequest  {}
message GetCurrentUserResponse { User user = 1; }

message UpdateUserRequest {
  string email = 1;
  string username = 2;
  string password = 3;
  string bio = 4;
  string image = 5;
}
message UpdateUserResponse { User user = 1; }

service AuthService {
  rpc Register(RegisterRequest)             returns (RegisterResponse);
  rpc Login(LoginRequest)                   returns (LoginResponse);
  rpc GetCurrentUser(GetCurrentUserRequest) returns (GetCurrentUserResponse);
  rpc UpdateUser(UpdateUserRequest)         returns (UpdateUserResponse);
}
