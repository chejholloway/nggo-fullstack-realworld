syntax = "proto3";
package comments.v1;
option go_package = "github.com/chejholloway/conduit-backend/gen/comments/v1;commentsv1";

message Comment {
  int32 id = 1;
  string created_at = 2;
  string updated_at = 3;
  string body = 4;

  message Author {
    string username = 1;
    string bio = 2;
    string image = 3;
    bool following = 4;
  }
  Author author = 5;
}

message AddCommentRequest    { string slug = 1; string body = 2; }
message AddCommentResponse   { Comment comment = 1; }
message GetCommentsRequest   { string slug = 1; }
message GetCommentsResponse  { repeated Comment comments = 1; }
message DeleteCommentRequest { string slug = 1; int32 id = 2; }
message DeleteCommentResponse {}

service CommentService {
  rpc AddComment(AddCommentRequest)       returns (AddCommentResponse);
  rpc GetComments(GetCommentsRequest)     returns (GetCommentsResponse);
  rpc DeleteComment(DeleteCommentRequest) returns (DeleteCommentResponse);
}
