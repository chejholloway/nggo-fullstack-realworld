<nav class="navbar">
  <div class="container">
    <a class="navbar-brand" routerLink="/">
      <img
        src="well-done-logo.png"
        alt="Well Done Logo"
        style="height: 200px; width: auto; position: relative; left: -4rem"
      />
    </a>
    <ul class="nav">
      <li class="nav-item">
        <a
          class="nav-link"
          routerLink="/"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          Home
        </a>
      </li>
      @if (authStore.user(); as user) {
        <li class="nav-item">
          <a class="nav-link" routerLink="/editor" routerLinkActive="active">
            <i class="ion-compose"></i>&nbsp;New Article
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/settings" routerLinkActive="active">
            <i class="ion-gear-a"></i>&nbsp;Settings
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" [routerLink]="['/profile', user.username]" routerLinkActive="active">
            {{ user.username }}
          </a>
        </li>
      } @else {
        <li class="nav-item">
          <a class="nav-link" routerLink="/login" routerLinkActive="active"> Sign in </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/register" routerLinkActive="active"> Sign up </a>
        </li>
      }
    </ul>
  </div>
</nav>
