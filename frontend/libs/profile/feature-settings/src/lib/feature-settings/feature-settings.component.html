<div class="settings-page">
  <h1>Your Settings</h1>
  
  @if (errors().length > 0) {
    <div class="error-messages">
      @for (error of errors(); track error) {
        <span class="error">{{ error }}</span>
      }
    </div>
  }

  <form (ngSubmit)="updateSettings()">
    <fieldset [disabled]="loading()">
      <div class="form-group">
        <input 
          type="text" 
          class="form-control form-control-lg" 
          placeholder="URL of profile picture"
          [(ngModel)]="imageUrl"
          name="imageUrl"
        />
      </div>
      
      <div class="form-group">
        <input 
          type="text" 
          class="form-control form-control-lg" 
          placeholder="Your Name"
          [(ngModel)]="username"
          name="username"
        />
      </div>
      
      <div class="form-group">
        <textarea 
          class="form-control form-control-lg" 
          rows="8"
          placeholder="Short bio about you"
          [(ngModel)]="bio"
          name="bio"
        ></textarea>
      </div>
      
      <div class="form-group">
        <input 
          type="email" 
          class="form-control form-control-lg" 
          placeholder="Email"
          [(ngModel)]="email"
          name="email"
        />
      </div>
      
      <div class="form-group">
        <input 
          type="password" 
          class="form-control form-control-lg" 
          placeholder="New Password"
          [(ngModel)]="newPassword"
          name="newPassword"
        />
      </div>
      
      <div class="form-group">
        <input 
          type="password" 
          class="form-control form-control-lg" 
          placeholder="Current Password (required to change password)"
          [(ngModel)]="password"
          name="password"
        />
      </div>
      
      <button 
        type="submit" 
        class="btn btn-lg btn-primary"
        [disabled]="loading()"
      >
        @if (loading()) {
          Updating Settings...
        } @else {
          Update Settings
        }
      </button>
    </fieldset>
  </form>
  
  <hr class="my-8" />
  
  <button 
    class="btn btn-outline-danger"
    (click)="logout()"
  >
    Or click here to logout.
  </button>
</div>
